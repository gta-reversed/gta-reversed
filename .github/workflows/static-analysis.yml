name: Static Analysis

env:
    # Compile in parallel where possible.
    CL: /MP

    # Path to the CMake build directory.
    build: "${{ github.workspace }}/build"

# Triggers the workflow on push or pull request events for all branches.
on: [push, pull_request]

permissions:
    contents: read

jobs:
    static-analysis:
        permissions:
            contents: read # for actions/checkout to fetch code
            security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
        strategy:
            fail-fast: false
            matrix:
                os: [windows-2025-vs2026]
                conf: [Debug, Release]
        runs-on: ${{ matrix.os }}
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup CMake using Conan
              uses: ./.github/actions/setup-cmake
              with:
                  os: ${{ matrix.os }}
                  arch: ${{ matrix.arch }}
                  conf: ${{ matrix.conf }}
                  preset: ${{ matrix.preset }}

            - name: Initialize MSVC Code Analysis
              uses: microsoft/msvc-code-analysis-action@v0.1.1
              id: analysis
              with:
                  cmakeBuildDirectory: ${{ env.build }}
                  # Ruleset file that will determine what checks will be run
                  ruleset: NativeRecommendedRules.ruleset
                  buildConfiguration: ${{ matrix.conf }}
                  # Exclude external libraries from analysis
                  ignoredPaths: ${{ github.workspace }}/libs

              # Upload SARIF file to GitHub Code Scanning Alerts
            - name: Upload SARIF to GitHub
              uses: github/codeql-action/upload-sarif@v3
              with:
                  sarif_file: ${{ steps.analysis.outputs.sarif }}
