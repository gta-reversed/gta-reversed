name: Build

env:
    # Compile in parallel where possible.
    CL: /MP

    # Path to the CMake build directory.
    build: "${{ github.workspace }}/build"

# Triggers the workflow on push or pull request events for all branches.
on: [push, pull_request]

permissions:
    contents: read

jobs:
    build:
        permissions:
            contents: read # for actions/checkout to fetch code
        strategy:
            fail-fast: false
            matrix:
                os: [windows-2025-vs2026]
                arch: [x86]
                conf: [Debug, Release]
                preset: [NoUnity, Unity]
        runs-on: ${{ matrix.os }}
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup CMake using Conan
              uses: ./.github/actions/setup-cmake
              with:
                  os: ${{ matrix.os }}
                  arch: ${{ matrix.arch }}
                  conf: ${{ matrix.conf }}
                  preset: ${{ matrix.preset }}

            - name: Build
              shell: cmd
              run: cmake --build build --config ${{ matrix.conf }}

            - name: Upload artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: gta_reversed-${{ matrix.conf }}-${{ matrix.preset }}
                  path: bin/${{ matrix.conf }}
