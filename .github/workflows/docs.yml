name: Deploy Doxygen to GitHub Pages

on:
  push:
    branches: ["master", "doxygen"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Doxygen
        run: |
          DOXYGEN_VERSION="1.16.1"
          # Doxygen uses underscores for release tags
          DOXYGEN_TAG="Release_${DOXYGEN_VERSION//./_}"
          echo "Downloading Doxygen $DOXYGEN_VERSION..."
          wget -q https://github.com/doxygen/doxygen/releases/download/${DOXYGEN_TAG}/doxygen-${DOXYGEN_VERSION}.linux.bin.tar.gz
          echo "Extracting..."
          tar -xzf doxygen-${DOXYGEN_VERSION}.linux.bin.tar.gz
          echo "Installing..."
          sudo cp doxygen-${DOXYGEN_VERSION}/bin/doxygen /usr/local/bin/
          # Verify installation
          doxygen -v

      - name: Configure CMake
        run: cmake -B build -DCMAKE_PROJECT_INCLUDE="${{ github.workspace }}/contrib/cmake-mock-for-doxygen.cmake"

      - name: Build Doxygen documentation
        run: cmake --build build --target doxygen

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './build/doxygen/html'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
